<!DOCTYPE html>
<html>

	<head>
        <title>HTML SVG, Multi-page</title>
	</head>

	<body>


		<h1> HTML SVG, Multi-page</h1>

		<h2>SVG</h2>
		<p>SVG= Scalable Vector Graphics</p>

		<svg width="102px" height="102px"> 
			<circle  cx="51"  cy="51"   r="50"
             fill="green" stroke=" black" stroke-width="2"
			/>
         <br> <br>
 
	     </svg>
	     <svg width="400px" height="100px"> 
			<rect  width="400px" height="100px"
             style="fill: rgb(290, 0, 220 ); stroke: #000000; stroke-width: 9px;"
			/>
         <br> <br>

	     </svg>

         <svg width="300px" height="200px">
            <rect  width="150px" height="150px"  x="50" y="30" rx="20"  ry="20"/>

            <br> <br>

         </svg>

         <svg width="300px" height="200px">
         	<polygon   points="100, 10 40, 198 190, 78 10, 78 160, 198" fill=" blue" fill-rule="evenodd" stroke="lime" stroke-width="5px"/>




          </svg>






	</body>
</html>
