<!DOCTYPE html>
<html>
<head>
	
	<title></title>
	<style>
	body {
		font-family: Arial, sans-serif;
		background: linear-gradient(to right, #74ebd5, #ACB6E5);
		margin: 0;
		padding: 0;
	}

	form {
		background: white;
		padding: 25px;
		width: 300px;
		margin: 80px auto;
		border-radius: 10px;
		box-shadow: 0 10px 25px rgba(0,0,0,0.2);
	}

	legend {
		font-size: 20px;
		font-weight: bold;
		margin-bottom: 10px;
	}

	label {
		font-size: 14px;
		color: #333;
	}

	input, textarea {
		width: 100%;
		margin-top: 5px;
		margin-bottom: 15px;
		padding: 8px;
		border-radius: 5px;
		border: 1px solid #ccc;
		transition: 0.3s;
	}

	input:focus, textarea:focus {
		border-color: #4CAF50;
		outline: none;
		box-shadow: 0 0 5px rgba(76,175,80,0.5);
	}

	input[type="checkbox"] {
		width: auto;
		margin-right: 5px;
	}

	input[type="submit"] {
		background: #4CAF50;
		color: white;
		border: none;
		padding: 10px;
		border-radius: 5px;
		cursor: pointer;
		font-weight: bold;
	}

	input[type="submit"]:hover {
		background: #45a049;
	}

	.checkbox-group {
		margin-bottom: 15px;
	}

	</style>
</head>
<body>
<form>

<fieldset>
<legend> Log In</legend>
<label for="firstname">First Name:</label> <br>
<input type="text" name="firstname"> <br>
<label for="lastname">Last Name:</label> <br>
<input type="text" name="lastname"> <br>
<label for="email">Email:</label> <br>
<input type="Email" name="email"> <br>
<label for="phone">Number:</label> <br>
<input type="tel" name="phone"> <br>
<label for="Pasword">Pasword:</label> <br>
<input type="Pasword" name="Pasword" placeholder="Your Pasword"> <br> <br>

 <label>Problems:</label><br> <br> 
 <label for="log in">Log In</label><br>
			<input type="checkbox" name="log in" id="log in" value="log in">
		<label for="Pasword">Pasword</label><br>
			<input type="checkbox" name="Pasword " id=" Pasword" value="Pasword ">

		<label for="Number ">Number</label><br>
			<input type="checkbox" name="Number" id="Number" value="Number ">

		<label for="Others">Others</label><br>
			<input type="checkbox" name="Others " id="Others" value="Others">

		
			
<textarea name="mesage" id="mesage" rows="10" cols="20"></textarea> <br>
  <input type="submit" value="Submit">

</fieldset>


</form>
</body>
</html>
